<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Problem Solution</title>

<style>
  .problem-img {
  margin-left: -30px;
}

  body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
    color: #ccc;
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
  }

  
  
  .top-image {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
  }

  .top-image img {
    width: 48%;
    height: auto;
  
  }

  
  .row {
    display: flex;
    justify-content: space-between;
    gap: 60px;
  }

  .box {
    flex: 1;
  }

  .title {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 20px;
  }

  .problem {
    color: white;
  }

  .solution {
    color: #7a3cff;
    margin-left: 20px;

  }

  .desc {
    color: #aaa;
    line-height: 1.6;
    max-width: 450px;
  }

  .divider {
    margin: 60px 0;
    height: 1px;
    background: #5a2dff;
    opacity: 0.5;
  }

  .project-box {
    border: 1px solid #5a2dff;
    border-radius: 20px;
    padding: 50px 20px;
    text-align: center;
  }

  .project-title {
    font-size: 36px;
    color: #7a3cff;
    margin-bottom: 20px;
    font-weight: bold;
  }

  .project-desc {
    max-width: 600px;
    margin: auto;
    color: #aaa;
    line-height: 1.6;
  }


  @media (max-width: 800px) {
    .row {
      flex-direction: column;
    }

    .top-image {
      flex-direction: column;
      gap: 20px;
    }

    .top-image img {
      width: 80%;
    }
  }
</style>
</head>

<body>

<div class="container">

 <div class="top-image">
  <img src="asl-problem.png" alt="Problem" class="problem-img">
  <img src="asl-solution.png" alt="Solution">
</div>



  <div class="row">

    <div class="box">
      <div class="title problem">PROBLEM</div>
      <div class="desc">
add text here      </div>
    </div>
    
    <div class="box">
      <div class="title solution">SOLUTION</div>
      <div class="desc">
Add text here
      </div>
    </div>

  </div>

  <div class="divider"></div>


  <div class="project-box">
    <div class="project-title">PROJECT HEARTHSTONE</div>
    <div class="project-desc">
Add text here .
    </div>
  </div>

</div>

</body>
</html>
