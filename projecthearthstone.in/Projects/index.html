<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Hearthstone - Projects</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../Navbar/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Orbitron:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="navbarcontainer"></div>
    <script type="module" src="../Navbar/script.js"></script>

    <!-- Linear Progress Bar -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-content">
        <h1 class="hero-title">
          <span class="shimmer">PROJECT HEARTHSTONE</span>
        </h1>
        <p class="hero-subtitle">Bridging Worlds Through AI</p>
        <div class="hero-divider"></div>
      </div>
    </section>

    <!-- Projects Split View -->
    <div class="projects-container">
      <!-- Left: Sticky Image Column -->
      <div class="image-column">
        <div class="sticky-image-wrapper">
          <img
            id="stickyImage"
            src=""
            alt="Project Preview"
            class="sticky-image glitch-target"
          />
          <div class="image-glow"></div>
        </div>
      </div>

      <!-- Right: Scrolling Content Column -->
      <div class="content-column">
        <div id="projectsTrack" class="projects-track">
          <!-- Project panels will be injected here by JavaScript -->
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
