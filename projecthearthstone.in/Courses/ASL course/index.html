<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASL Mastery — Course Map</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../../Navbar/styles.css">

</head>
<body>
  <!-- navbar looks weird on this and on the course page, will deal with it later -->
  <!-- <div id="navbarcontainer"></div> -->
  <canvas id="star-canvas"></canvas>
  <div id="ambient-layer"></div>
  <div id="vignette"></div>
  <div id="scanlines"></div>

  <div class="flash-overlay" id="flashOverlay"></div>
  <div id="hud-title">ASL Mastery · Course Map</div>

  <div id="progress-bar">
    <div class="pdot on" data-lesson="1"></div>
    <div class="pdot"    data-lesson="2"></div>
    <div class="pdot"    data-lesson="3"></div>
    <div class="pdot"    data-lesson="4"></div>
    <div class="pdot"    data-lesson="5"></div>
    <div class="pdot"    data-lesson="6"></div>
    <div class="pdot"    data-lesson="7"></div>
  </div>

  <div id="nav-cluster">
    <div class="nav-row">
      <button class="nav-btn" id="btn-home">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M1.5 6.8L8 1.5l6.5 5.3V14.5a.8.8 0 01-.8.8H10V11H6v4.3H2.3a.8.8 0 01-.8-.8V6.8z"
                stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        </svg>
        <span>Map</span>
      </button>
      <button class="nav-btn accent" id="btn-current">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.3"/>
          <line x1="8" y1="1" x2="8" y2="4"   stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="8" y1="12" x2="8" y2="15" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="1" y1="8" x2="4"  y2="8"  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="12" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span>Current Lesson</span>
      </button>
    </div>
    <div class="nav-row">
      <button class="nav-btn nav-arrow" id="btn-prev">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M8.5 2L4 6.5l4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Prev</span>
      </button>
      <div class="nav-index" id="nav-index">1 / 7</div>
      <button class="nav-btn nav-arrow" id="btn-next">
        <span>Next</span>
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M4.5 2L9 6.5 4.5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="minimap"><div id="mm-viewport-box"></div></div>

  <div id="viewport">
    <div id="world">

      <img id="tree-img" src="Tree-graphic.png" alt="Tree" draggable="false"/>
      <svg id="path-svg" viewBox="0 0 3200 3200" xmlns="http://www.w3.org/2000/svg">
      </svg>

      <div class="portal-wrap"        data-idx="0" style="left:700px;  top:2680px;"></div>
      <div class="portal-wrap locked" data-idx="1" style="left:2780px; top:2620px;"></div>
      <div class="portal-wrap locked" data-idx="2" style="left:1100px; top:2100px;"></div>
      <div class="portal-wrap locked" data-idx="3" style="left:2150px; top:1780px;"></div>
      <div class="portal-wrap locked" data-idx="4" style="left:680px;  top:1480px;"></div>
      <div class="portal-wrap locked" data-idx="5" style="left:2600px; top:1080px;"></div>
      <div class="portal-wrap locked boss" data-idx="6" style="left:1600px; top:310px;"></div>

    </div>
  </div>

  <script type="module" src="../../../Navbar/script.js"></script>
  <script src="script.js"></script>
</body>
</html>
